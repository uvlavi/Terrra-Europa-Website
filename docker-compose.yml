services:
  europa:
    build: .
    expose:
      - "8103"
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    environment:
      PORT: "8103"
      ACCESS_KEY: ${ACCESS_KEY:-28061972}
      FROM_EMAIL: ${FROM_EMAIL:-yuval@terrra-europa.com}
      FROM_NAME: ${FROM_NAME:-Yuval Lavi}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-yuval@terrra-europa.com}
      ADMIN_EXTERNAL_EMAIL: ${ADMIN_EXTERNAL_EMAIL:-yuval.lavi@gmail.com}
      GA4_ID: ${GA4_ID:-}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-537937190}
      GA4_KEY_FILE: ${GA4_KEY_FILE:-/app/secrets/ga4-key.json}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      # SMTP fallback (if EMAIL_PROVIDER=smtp)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - europa
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
